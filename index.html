<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>發一天元・曹老道場・佛堂行事曆</title>
<meta property="og:title" content="發一天元・曹老道場・佛堂行事曆">
<meta property="og:description" content="四間公壇與家庭佛堂日程總覽，法會、辦道、班程一目了然">
<meta property="og:image" content="https://youshine168.github.io/Cheng-Yu/og.jpg">
<meta property="og:url" content="https://youshine168.github.io/Cheng-Yu/">

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="佛堂行事曆">
<meta name="theme-color" content="#FAF7F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#FAF7F0; --card:#FFFFFF; --ink:#3B3128; --ink2:#7A7266;
  --gold:#A8823C; --gold-soft:#E9DFC8; --line:#E8E1D3; --brown:#5C4A33;
  --today:#FBF3DF;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:40px}
/* 背景水墨圖：iOS Safari 對 background-attachment:fixed 支援差，用 fixed div */
.bgart{position:fixed;inset:0;z-index:-1;background:var(--bg) url('bg.jpg') center top/cover no-repeat}
.wrap{max-width:640px;margin:0 auto;padding:0 14px}
/* header */
header{border-bottom:1px solid var(--line);padding:18px 0 14px}
.h-row{display:flex;align-items:center;justify-content:space-between}
h1{font-family:'Noto Serif TC',serif;font-size:1.45rem;color:var(--brown);letter-spacing:.12em}
h1 small{display:block;font-size:.72rem;color:var(--gold);letter-spacing:.28em;font-weight:600;margin-bottom:2px}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:7px 14px;font-size:.9rem;font-family:inherit;cursor:pointer}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn.ghost{background:transparent}
.btn.danger{color:#A03A2E;border-color:#E3C4BE}
.btn.big{display:block;width:100%;padding:14px;font-size:1.05rem;letter-spacing:.15em;margin:16px 0}
.btn:active{opacity:.75}
/* controls */
.controls{display:flex;gap:10px;margin:14px 0;align-items:center}
.chips{flex:1;min-width:0;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:20px;padding:7px 14px;font-size:.88rem;color:var(--ink2);cursor:pointer;font-family:inherit;white-space:nowrap}
.chip.on{background:var(--gold);border-color:var(--gold);color:#fff}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card);flex-shrink:0}
.seg button{border:none;background:transparent;padding:9px 16px;font-size:.9rem;font-family:inherit;color:var(--ink2);cursor:pointer}
.seg button.on{background:var(--gold);color:#fff}
/* month nav */
.mnav{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px}
.mnav .title{font-family:'Noto Serif TC',serif;font-size:1.15rem;color:var(--brown);letter-spacing:.08em}
.mnav .nav{display:flex;gap:8px;align-items:center}
.mnav button{border:1px solid var(--line);background:var(--card);border-radius:8px;width:36px;height:36px;font-size:1rem;color:var(--gold);cursor:pointer}
.mnav .today-btn{width:auto;padding:0 12px;font-size:.85rem;color:var(--ink2)}
/* calendar */
.cal{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:#F5EFE2;border-bottom:1px solid var(--line)}
.cal-head div{text-align:center;font-size:.75rem;color:var(--brown);padding:7px 0;letter-spacing:.1em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{min-height:58px;border-top:1px solid var(--line);border-right:1px solid var(--line);padding:5px 3px 3px;cursor:pointer;position:relative}
.cell:nth-child(7n){border-right:none}
.cell.dim{background:#FCFAF5}
.cell.dim .dnum{color:#C9C2B4}
.cell .dnum{font-size:.8rem;text-align:center;width:24px;height:24px;line-height:24px;margin:0 auto;border-radius:50%}
.cell .lun{font-size:.56rem;color:#B3AA97;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden}
.cell .lun.sp{color:var(--gold);font-weight:700}
.cell.dim .lun{color:#D8D2C4}
.cell.today .dnum{background:var(--gold);color:#fff;font-weight:700}
.cell.sel{background:var(--today)}
.dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px;min-height:8px}
.dot{width:6px;height:6px;border-radius:50%}
.more{font-size:.6rem;color:var(--ink2);line-height:6px}
/* day detail & list */
.day-title{font-family:'Noto Serif TC',serif;color:var(--brown);font-size:1rem;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.badge-today{background:var(--gold);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:20px;font-family:'Noto Sans TC';letter-spacing:.1em}
.luntag{font-size:.72rem;color:var(--ink2);font-family:'Noto Sans TC';font-weight:400}
.empty{color:var(--ink2);font-size:.9rem;text-align:center;padding:26px 0}
/* event card */
.ev{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;border-left:4px solid var(--gold)}
.ev-main{padding:11px 14px;cursor:pointer;display:flex;gap:10px;align-items:baseline}
.ev-time{font-size:.8rem;color:var(--ink2);white-space:nowrap;min-width:44px}
.ev-name{font-weight:500;flex:1}
.ev-tags{display:flex;gap:6px;flex-shrink:0;align-items:center}
.tag{font-size:.68rem;padding:2px 8px;border-radius:20px;color:#fff;white-space:nowrap}
.ev-body{display:none;padding:0 14px 12px;border-top:1px dashed var(--line);font-size:.88rem;color:var(--ink)}
.ev.open .ev-body{display:block}
.ev-body .row{display:flex;gap:8px;margin-top:8px}
.ev-body .lbl{color:var(--gold);flex-shrink:0;font-weight:500}
.ev-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ev-body a.linkbtn{display:inline-block;background:var(--gold);color:#fff;text-decoration:none;padding:8px 18px;border-radius:8px;font-size:.88rem}
.copybtn{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 18px;border-radius:8px;font-size:.88rem;font-family:inherit;cursor:pointer}
.week-hr{border:none;border-top:1px solid var(--line);margin:18px 0 4px}
/* legend */
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:18px 0 10px;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px}
.legend .li{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--ink2)}
/* admin page */
.admin-head{display:flex;align-items:center;justify-content:space-between;margin:20px 0 14px;gap:10px}
.admin-name{font-family:'Noto Serif TC',serif;font-size:1.15rem;color:var(--brown);display:flex;align-items:center;gap:8px;min-width:0}
.admin-name span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-admin{border:1px solid var(--gold);color:var(--gold);font-size:.68rem;padding:1px 8px;border-radius:4px;letter-spacing:.2em;font-family:'Noto Sans TC';flex-shrink:0}
.admin-head .btns{display:flex;gap:8px;flex-shrink:0}
.notice{border:1px solid var(--gold-soft);border-left:3px solid var(--gold);background:#FFFDF8;color:var(--ink2);font-size:.85rem;padding:10px 14px;border-radius:8px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 16px;margin:16px 0}
.panel h2{font-family:'Noto Serif TC',serif;color:var(--brown);font-size:1.1rem;margin-bottom:14px;letter-spacing:.08em}
/* admin event list */
.arow{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:center}
.arow .info{flex:1;min-width:0}
.arow .adate{font-size:.8rem;color:var(--ink2)}
.arow .aname{font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.arow .asub{font-size:.78rem;color:var(--ink2)}
.arow .btns{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.arow .btns .btn{padding:5px 12px;font-size:.82rem}
.sec-title{font-family:'Noto Serif TC',serif;color:var(--brown);font-size:1rem;margin:20px 0 10px;letter-spacing:.08em}
/* form */
.f{margin-bottom:12px}
.f label{display:block;font-size:.8rem;color:var(--ink2);margin-bottom:4px}
.f label .req{color:#A03A2E}
.f input,.f select,.f textarea{width:100%;min-width:0;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:16px;font-family:inherit;background:#FFFDF8;color:var(--ink)}
/* iOS 的日期/時間輸入框給固定高度並靠左，避免擠版 */
.f input[type=date],.f input[type=time]{-webkit-appearance:none;appearance:none;min-height:46px;text-align:left}
.f textarea{min-height:70px;resize:vertical}
.tseg{display:flex;width:100%}
.tseg button{flex:1;padding:10px}
.m-actions{display:flex;gap:10px;margin-top:16px}
.m-actions .btn{flex:1;padding:12px;font-size:1rem}
/* toast & banner */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--brown);color:#fff;padding:9px 20px;border-radius:24px;font-size:.85rem;z-index:99;display:none;white-space:nowrap}
.banner{background:#FBF3DF;border:1px solid var(--gold-soft);color:var(--brown);font-size:.82rem;padding:9px 12px;border-radius:8px;margin:10px 0}
#loading{text-align:center;color:var(--ink2);font-size:.85rem;padding:8px 0;display:none}
</style>
</head>
<body>
<div class="bgart"></div>

<header>
  <div class="wrap h-row">
    <h1><small>發一天元 ・ 曹老道場</small>佛堂行事曆</h1>
    <button class="btn ghost" id="adminBtn" style="color:var(--gold)">管理</button>
  </div>
</header>

<!-- ================= 前台 ================= -->
<div class="wrap" id="mainView">
  <div id="apiBanner" class="banner" style="display:none">尚未連接後端：請在程式碼開頭填入 Apps Script 網址（API_URL）。</div>
  <div id="loading">資料更新中…</div>

  <div class="controls">
    <div class="chips" id="templeChips"></div>
    <div class="seg">
      <button id="viewCal" class="on">月曆</button>
      <button id="viewList">列表</button>
    </div>
  </div>

  <div id="weekAhead"></div>

  <div class="mnav">
    <div class="nav"><button id="prevM">‹</button></div>
    <div class="title" id="mTitle"></div>
    <div class="nav"><button id="nextM">›</button><button class="today-btn" id="goToday">今天</button></div>
  </div>

  <div id="calView">
    <div class="cal">
      <div class="cal-head"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="day-title" id="dayTitle"></div>
    <div id="dayEvents"></div>
  </div>

  <div id="listView" style="display:none"></div>

  <div class="legend" id="legend"></div>
</div>

<!-- ================= 管理入口 ================= -->
<div class="wrap" id="adminView" style="display:none">

  <!-- 登入 -->
  <section class="panel" id="loginCard" style="margin-top:24px">
    <h2>管理員登入</h2>
    <div class="f"><label>名稱</label><input id="loginName" placeholder="例：誠鈺佛堂" autocomplete="off"></div>
    <div class="f"><label>密碼</label><input type="password" id="loginCode" autocomplete="off"></div>
    <div class="m-actions">
      <button class="btn" onclick="location.hash=''">回行事曆</button>
      <button class="btn gold" id="loginGo">登入</button>
    </div>
  </section>

  <!-- 管理主頁 -->
  <div id="adminHome" style="display:none">
    <div class="admin-head">
      <div class="admin-name"><span id="adminWho"></span><span class="badge-admin">管理員</span></div>
      <div class="btns">
        <button class="btn" onclick="location.hash=''">回行事曆</button>
        <button class="btn" id="logoutBtn">登出</button>
      </div>
    </div>
    <div class="notice">這裡新增或修改的日程會存進雲端資料庫，所有人打開網頁都看得到最新內容。</div>

    <button class="btn gold big" id="addEvBtn">＋ 新增日程</button>

    <!-- 日程表單（按「新增日程」或「編輯」才展開） -->
    <section class="panel" id="adminPanel" style="display:none;margin-top:0">
      <h2 id="evFormTitle">新增日程</h2>
      <div class="f">
        <label>所屬佛堂 <span class="req">＊</span></label>
        <select id="fTemple"></select>
        <input id="fTempleX" placeholder="輸入佛堂名稱（僅這筆日程使用）" style="display:none;margin-top:8px">
      </div>
      <div class="f"><label>日程名稱 <span class="req">＊</span></label><input id="fName"></div>
      <div class="f"><label>日期 <span class="req">＊</span></label><input type="date" id="fDate"></div>
      <div class="f"><label>結束日期（跨日才填，單日免填）</label><input type="date" id="fEndDate"></div>
      <div class="f" id="repeatRow" style="display:flex;gap:14px">
        <div style="flex:1;min-width:0"><label>重複</label>
          <select id="fRepeat">
            <option value="">不重複</option>
            <option value="7">每週</option>
            <option value="14">每兩週</option>
            <option value="m">每月</option>
          </select>
        </div>
        <div style="flex:1;min-width:0"><label>重複到（含當天）</label><input type="date" id="fRepeatEnd" disabled></div>
      </div>
      <div class="f">
        <label>時間</label>
        <div class="seg tseg"><button type="button" id="tTimed" class="on">指定時間</button><button type="button" id="tAllday">全天</button></div>
      </div>
      <div class="f" id="timeRow" style="display:flex;gap:14px">
        <div style="flex:1;min-width:0"><label>起始時間</label><input type="time" id="fStart"></div>
        <div style="flex:1;min-width:0"><label>結束時間</label><input type="time" id="fEnd"></div>
      </div>
      <div class="f">
        <label>類型</label>
        <select id="fType"></select>
        <input id="fTypeX" placeholder="輸入類型名稱（僅這筆日程使用）" style="display:none;margin-top:8px">
      </div>
      <div class="f">
        <label>地點</label>
        <select id="fPlace"></select>
        <input id="fPlaceX" placeholder="輸入地點（僅這筆日程使用）" style="display:none;margin-top:8px">
      </div>
      <div class="f"><label>連結（報名表單、直播網址）</label><input type="url" id="fLink" placeholder="https://"></div>
      <div class="f"><label>備註</label><textarea id="fNote"></textarea></div>
      <div class="m-actions">
        <button class="btn" id="evCancel">取消</button>
        <button class="btn gold" id="evSave">儲存</button>
      </div>
    </section>

    <div id="adminList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ======= 設定：部署 Apps Script 後，把「網頁應用程式」網址貼在這裡 ======= */
const API_URL = 'https://script.google.com/macros/s/AKfycbxcY5WoB279K2RMCQCtGIr_U_agMfRp1sxUl1EcGNMI0TRikXTOGMiBezu8P-KCZViw/exec';
/* ======================================================================= */

const DEFAULT_TEMPLES = ['誠鈺佛堂','善鈺佛堂','仁鈺佛堂','天心佛堂'];
const DEFAULT_TYPES = [
  {name:'法會',      color:'#8C6A3F'},
  {name:'道學研究班', color:'#3F6E5C'},
  {name:'讀經班',    color:'#4A6FA0'},
  {name:'培訓班',    color:'#B08830'},
  {name:'辦道',      color:'#9C3D3D'},
  {name:'彈性活動',   color:'#77746A'},
  {name:'獻供',      color:'#C08A2E'},
  {name:'會議',      color:'#5B7A6A'},
];

let data = {events:[], temples:DEFAULT_TEMPLES.slice(), types:DEFAULT_TYPES.slice(), fixed:[]};
let state = {view:'cal', temple:'全部', month:new Date(), selDate:fmtDate(new Date()), editingId:null};
let admin = null; // {name, code}

const $ = id => document.getElementById(id);
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',2200); }
function typeColor(name){ const t=data.types.find(x=>x.name===name); return t?t.color:'#77746A'; }
function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function timeText(e){ return e.start ? e.start+(e.end?'–'+e.end:'') : '全天'; }

/* ---------- 農曆（用瀏覽器內建 Intl 中國曆，不用資料表） ---------- */
let lunarFmt = null;
try{
  lunarFmt = new Intl.DateTimeFormat('zh-Hant-u-ca-chinese',{month:'long',day:'numeric'});
  lunarFmt.formatToParts(new Date());
}catch(e){ lunarFmt = null; } // 不支援就整個隱藏農曆
const LDAY = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
// 回傳 {t:'廿六', sp:false, key:'六月26'}；初一顯示月名、初一/十五標金色
function lunar(d){
  if(!lunarFmt) return null;
  const parts = lunarFmt.formatToParts(d);
  const m = parts.find(p=>p.type==='month').value;
  const dd = +parts.find(p=>p.type==='day').value;
  return { t: dd===1 ? m : LDAY[dd], sp: dd===1 || dd===15, key: m+dd, full: m+LDAY[dd] };
}

/* ---------- 農曆固定日程（初一十五獻供、聖誕成道日，存在試算表「農曆固定」） ---------- */
// 瀏覽器農曆引擎把十一月叫「冬月」、十二月叫「臘月」，這裡對應回來
const LMONTH_MAP = {'十一月':'冬月','十二月':'臘月','閏十一月':'閏冬月','閏十二月':'閏臘月'};
// '十二月二十九日' → '臘月29'
function lunarKeyFromText(t){
  t = String(t||'').trim().replace(/日$/,'');
  const i = t.indexOf('月');
  if(i<0) return null;
  const mon = LMONTH_MAP[t.slice(0,i+1)] || t.slice(0,i+1);
  const dayT = t.slice(i+1);
  let d = LDAY.indexOf(dayT);
  if(d<1) d = LDAY.indexOf(dayT.replace(/^二十(.+)/,'廿$1')); // 二十九 → 廿九
  if(d<1) return null;
  return mon+d;
}
let fixedMap = {};
function buildFixedMap(){
  fixedMap = {};
  (data.fixed||[]).forEach(f=>{
    const k = lunarKeyFromText(f.lunar);
    if(k) fixedMap[k] = f.name;
  });
}
// 這一天有沒有農曆固定日程，有就生一筆虛擬日程（不能編輯，管理要改試算表「農曆固定」）
function fixedFor(d){
  const lu = lunar(d);
  if(!lu || !fixedMap[lu.key]) return null;
  const ds = fmtDate(d);
  return { id:'fx-'+ds, temple:'各佛堂', name:fixedMap[lu.key], date:ds, endDate:'',
           start:'', end:'', type:'獻供', place:'', link:'', note:'農曆'+lu.full+'固定日程' };
}
// 某一天的全部日程 = 一般日程 + 農曆固定
function dayList(byDate, d){
  const list = (byDate[fmtDate(d)]||[]).slice();
  const f = fixedFor(d);
  if(f) list.unshift(f);
  return list;
}
function dateText(e){ return e.endDate ? e.date+' ～ '+e.endDate : e.date; }
// 把跨日日程展開到每一天（上限 60 天防呆）
function expandByDate(evs){
  const m={};
  evs.forEach(e=>{
    const end = (e.endDate && e.endDate>e.date) ? e.endDate : e.date;
    let d = new Date(e.date+'T00:00:00');
    for(let i=0;i<60;i++){
      const ds=fmtDate(d);
      (m[ds]=m[ds]||[]).push(e);
      if(ds>=end) break;
      d.setDate(d.getDate()+1);
    }
  });
  return m;
}

/* ---------- API ---------- */
async function apiGet(){
  if(!API_URL){ $('apiBanner').style.display='block'; return; }
  $('loading').style.display='block';
  try{
    const r = await fetch(API_URL+'?action=all');
    const j = await r.json();
    if(j.ok){
      data = {events:j.events, temples:j.temples, types:j.types, fixed:j.fixed||[]};
      localStorage.setItem('ft_cache_v1', JSON.stringify(data));
      renderAll();
    }
  }catch(e){ toast('連線失敗，顯示快取資料'); }
  $('loading').style.display='none';
}
async function apiPost(body){
  // ponytail: text/plain 避開 CORS 預檢，GAS 端 JSON.parse
  const auth = admin ? {adminName:admin.name, code:admin.code} : {};
  const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(Object.assign(auth, body))});
  return r.json();
}

/* ---------- 渲染 ---------- */
function eventsFiltered(){
  let evs = data.events;
  if(state.temple!=='全部') evs = evs.filter(e=>e.temple===state.temple);
  return evs.slice().sort((a,b)=> a.date===b.date ? (a.start||'').localeCompare(b.start||'') : a.date.localeCompare(b.date));
}
function renderAll(){
  buildFixedMap();
  renderChips(); renderMonth(); renderLegend(); renderAdminList();
  if(admin){ // 資料更新後同步表單選項（保留目前選取）
    const t=$('fTemple').value, p=$('fPlace').value, y=$('fType').value;
    $('fTemple').innerHTML = comboOpts(data.temples, t==='__new__'?data.temples[0]:t, '＋新增佛堂（單次）');
    $('fPlace').innerHTML = comboOpts(data.temples, p==='__new__'?'':p, '＋新增地點（單次）', '未指定');
    $('fType').innerHTML = comboOpts(typeNames(), y==='__new__'?typeNames()[0]:y, '＋新增類型（單次）');
    if(t==='__new__') $('fTemple').value='__new__';
    if(p==='__new__') $('fPlace').value='__new__';
    if(y==='__new__') $('fType').value='__new__';
  }
}
function renderChips(){
  if(!['全部',...data.temples].includes(state.temple)) state.temple='全部';
  $('templeChips').innerHTML = ['全部',...data.temples].map(t=>
    `<button class="chip ${t===state.temple?'on':''}" data-t="${esc(t)}">${esc(t)}</button>`).join('');
  $('templeChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ state.temple=c.dataset.t; renderChips(); renderMonth(); });
}
function renderLegend(){
  $('legend').innerHTML = data.types.map(t=>
    `<span class="li"><span class="dot" style="background:${t.color}"></span>${esc(t.name)}</span>`).join('');
}
function renderMonth(){
  const y=state.month.getFullYear(), m=state.month.getMonth();
  $('mTitle').textContent = y+'年'+(m+1)+'月';
  renderWeek();
  if(state.view==='cal'){ renderCal(y,m); renderDay(); } else renderList(y,m);
}
function renderCal(y,m){
  const first = new Date(y,m,1), start = new Date(y,m,1-first.getDay());
  const todayS = fmtDate(new Date());
  const byDate = expandByDate(eventsFiltered());
  let html='';
  for(let i=0;i<42;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const ds = fmtDate(d), inM = d.getMonth()===m;
    const list = dayList(byDate, d);
    const dots = list.slice(0,4).map(e=>`<span class="dot" style="background:${typeColor(e.type)}"></span>`).join('')
      + (list.length>4?`<span class="more">+${list.length-4}</span>`:'');
    const lu = lunar(d);
    html += `<div class="cell ${inM?'':'dim'} ${ds===todayS?'today':''} ${ds===state.selDate?'sel':''}" data-d="${ds}">
      <div class="dnum">${d.getDate()}</div>${lu?`<div class="lun ${lu.sp?'sp':''}">${lu.t}</div>`:''}<div class="dots">${dots}</div></div>`;
  }
  $('calGrid').innerHTML = html;
  $('calGrid').querySelectorAll('.cell').forEach(c=>c.onclick=()=>{ state.selDate=c.dataset.d; renderCal(y,m); renderDay(); });
}
function evCard(e){
  // 一律預設展開；點卡片可收合
  return `<div class="ev open" style="border-left-color:${typeColor(e.type)}">
    <div class="ev-main" onclick="this.parentNode.classList.toggle('open')">
      <span class="ev-time">${esc(timeText(e))}</span>
      <span class="ev-name">${esc(e.name)}</span>
      <span class="ev-tags">
        ${e.type?`<span class="tag" style="background:${typeColor(e.type)}">${esc(e.type)}</span>`:''}
      </span>
    </div>
    <div class="ev-body">
      <div class="row"><span class="lbl">所屬佛堂</span><span>${esc(e.temple)}</span></div>
      ${e.place?`<div class="row"><span class="lbl">地點</span><span>${esc(e.place)}</span></div>`:''}
      <div class="row"><span class="lbl">日期</span><span>${esc(dateText(e))} ${esc(timeText(e))}</span></div>
      ${e.note?`<div class="row"><span class="lbl">備註</span><span>${esc(e.note)}</span></div>`:''}
      <div class="ev-actions">
        ${e.link?`<a class="linkbtn" href="${esc(e.link)}" target="_blank" rel="noopener">🔗 開啟連結</a>`:''}
        <button class="copybtn" onclick="copyEv('${esc(e.id)}')">📋 複製文字</button>
      </div>
    </div>
  </div>`;
}
// 近 7 日摘要（依目前佛堂篩選）
function renderWeek(){
  const byDate = expandByDate(eventsFiltered());
  const wd=['日','一','二','三','四','五','六'];
  const todayS = fmtDate(new Date());
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const ds=fmtDate(d), list=dayList(byDate,d);
    if(!list.length) continue;
    html += `<div class="day-title">${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）${ds===todayS?'<span class="badge-today">今天</span>':''}</div>`
      + list.map(evCard).join('');
  }
  $('weekAhead').innerHTML = html ? `<div class="sec-title" style="margin-top:6px">近 7 日日程</div>${html}<hr class="week-hr">` : '';
}
function renderDay(){
  const ds = state.selDate, todayS = fmtDate(new Date());
  const list = dayList(expandByDate(eventsFiltered()), new Date(ds+'T00:00:00'));
  const [y,m,d] = ds.split('-');
  const lu = lunar(new Date(ds+'T00:00:00'));
  $('dayTitle').innerHTML = `${+m}月${+d}日 日程 ${lu?`<span class="luntag">農曆${lu.t.includes('月')?lu.t+'初一':lu.t}</span>`:''} ${ds===todayS?'<span class="badge-today">今天</span>':''}`;
  $('dayEvents').innerHTML = list.length ? list.map(evCard).join('') : '<div class="empty">這一天沒有安排日程</div>';
}
function renderList(y,m){
  const byDate = expandByDate(eventsFiltered());
  const todayS = fmtDate(new Date());
  const wd=['日','一','二','三','四','五','六'];
  const lastDay = new Date(y,m+1,0).getDate();
  let html='';
  for(let dd=1; dd<=lastDay; dd++){
    const d = new Date(y,m,dd), ds = fmtDate(d);
    const list = dayList(byDate, d);
    if(!list.length) continue;
    html += `<div class="day-title">${m+1}月${dd}日（${wd[d.getDay()]}）${ds===todayS?'<span class="badge-today">今天</span>':''}</div>`
      + list.map(evCard).join('');
  }
  $('listView').innerHTML = html || '<div class="empty">本月尚無日程</div>';
}

/* ---------- 檢視切換 ---------- */
function setView(v){
  state.view=v;
  $('viewCal').classList.toggle('on',v==='cal');
  $('viewList').classList.toggle('on',v==='list');
  $('calView').style.display = v==='cal'?'':'none';
  $('listView').style.display = v==='list'?'':'none';
  renderMonth();
}
$('viewCal').onclick=()=>setView('cal');
$('viewList').onclick=()=>setView('list');
$('prevM').onclick=()=>{ state.month.setMonth(state.month.getMonth()-1); renderMonth(); };
$('nextM').onclick=()=>{ state.month.setMonth(state.month.getMonth()+1); renderMonth(); };
$('goToday').onclick=()=>{ state.month=new Date(); state.selDate=fmtDate(new Date()); renderMonth(); };

/* ---------- 路由：#admin = 管理入口 ---------- */
function route(){
  const onAdmin = location.hash === '#admin';
  $('mainView').style.display = onAdmin?'none':'';
  $('adminView').style.display = onAdmin?'':'none';
  if(onAdmin){
    $('loginCard').style.display = admin?'none':'';
    $('adminHome').style.display = admin?'':'none';
    renderAdminList();
  }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);
$('adminBtn').onclick=()=>{ if(!API_URL) return toast('請先連接後端'); location.hash='#admin'; };

/* ---------- 管理員 ---------- */
function setAdmin(a){
  admin=a;
  if(a){ $('adminWho').textContent=a.name; localStorage.setItem('ft_admin', JSON.stringify(a)); }
  else localStorage.removeItem('ft_admin');
  closeEvForm();
  route(); renderAll();
}
$('logoutBtn').onclick=()=>setAdmin(null);
$('loginGo').onclick=async()=>{
  const name=$('loginName').value.trim(), code=$('loginCode').value.trim();
  if(!name||!code) return toast('請輸入名稱與密碼');
  $('loginGo').textContent='驗證中…';
  try{
    const j = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'login',adminName:name,code})}).then(r=>r.json());
    if(j.ok){ setAdmin({name:j.name,code}); toast('歡迎，'+j.name); }
    else toast(j.error||'名稱或密碼錯誤');
  }catch(e){ toast('連線失敗'); }
  $('loginGo').textContent='登入';
};

/* ---------- 管理日程清單 ---------- */
function arow(e){
  return `<div class="arow" style="border-left-color:${typeColor(e.type)}">
    <div class="info">
      <div class="adate">${esc(dateText(e))}　${esc(timeText(e))}</div>
      <div class="aname">${e.type?`<span class="tag" style="background:${typeColor(e.type)}">${esc(e.type)}</span>`:''}${esc(e.name)}</div>
      <div class="asub">${esc(e.temple)}${e.place?'｜'+esc(e.place):''}</div>
    </div>
    <div class="btns">
      <button class="btn" onclick="editEv('${esc(e.id)}')">編輯</button>
      <button class="btn danger" onclick="delEv('${esc(e.id)}')">刪除</button>
    </div>
  </div>`;
}
function renderAdminList(){
  if(!admin || location.hash!=='#admin') return;
  const todayS = fmtDate(new Date());
  const evs = data.events.slice().sort((a,b)=> a.date===b.date ? (a.start||'').localeCompare(b.start||'') : a.date.localeCompare(b.date));
  const up = evs.filter(e=>e.date>=todayS);
  const past = evs.filter(e=>e.date<todayS).reverse();
  let html='';
  html += '<div class="sec-title">近期與未來日程</div>';
  html += up.length ? up.map(arow).join('') : '<div class="empty">目前沒有排定的日程</div>';
  if(past.length) html += '<div class="sec-title">過往日程</div>' + past.map(arow).join('');
  $('adminList').innerHTML = html;
}

/* ---------- 日程表單 ---------- */
// 全天／指定時間 切換
function setAllday(on){
  $('tAllday').classList.toggle('on',on);
  $('tTimed').classList.toggle('on',!on);
  $('timeRow').style.display = on?'none':'flex';
  if(on){ $('fStart').value=''; $('fEnd').value=''; }
}
$('tAllday').onclick=()=>setAllday(true);
$('tTimed').onclick=()=>setAllday(false);
$('fRepeat').onchange=()=>{ const on=!!$('fRepeat').value; $('fRepeatEnd').disabled=!on; if(!on) $('fRepeatEnd').value=''; };
// 依重複設定展開成多筆（上限 60 筆；每月遇到沒有那天的月份自動跳過，例如 31 號）
function occurrences(ev, mode, until){
  const out=[];
  const start=new Date(ev.date+'T00:00:00');
  const span = ev.endDate ? Math.round((new Date(ev.endDate+'T00:00:00')-start)/86400000) : 0;
  for(let k=0; k<720 && out.length<60; k++){
    let d;
    if(mode==='m'){
      d=new Date(start.getFullYear(), start.getMonth()+k, start.getDate());
      if(d.getDate()!==start.getDate()) continue;
    }else{
      d=new Date(start.getFullYear(), start.getMonth(), start.getDate()+k*(+mode));
    }
    const ds=fmtDate(d);
    if(ds>until) break;
    out.push(Object.assign({}, ev, {date:ds,
      endDate: span ? fmtDate(new Date(d.getFullYear(), d.getMonth(), d.getDate()+span)) : ''}));
  }
  return out;
}
// 佛堂／地點／類型下拉：固定選項＋「＋新增（單次）」；單次輸入不入庫，只存在該筆日程
function comboOpts(list, cur, newLabel, emptyLabel){
  let opts = list.slice();
  if(cur && !opts.includes(cur)) opts.unshift(cur); // 單次輸入的既有值
  return (emptyLabel?`<option value="">${emptyLabel}</option>`:'') +
    opts.map(o=>`<option value="${esc(o)}" ${o===cur?'selected':''}>${esc(o)}</option>`).join('') +
    `<option value="__new__">${newLabel}</option>`;
}
function typeNames(){ return data.types.map(t=>t.name); }
function syncCombo(selId, xId){
  $(xId).style.display = $(selId).value==='__new__' ? '' : 'none';
  if($(selId).value!=='__new__') $(xId).value='';
}
$('fTemple').onchange=()=>syncCombo('fTemple','fTempleX');
$('fPlace').onchange=()=>syncCombo('fPlace','fPlaceX');
$('fType').onchange=()=>syncCombo('fType','fTypeX');
function comboValue(selId, xId){
  return $(selId).value==='__new__' ? $(xId).value.trim() : $(selId).value;
}
function fillEvForm(ev){
  state.editingId = ev?ev.id:null;
  $('evFormTitle').textContent = ev?'編輯日程':'新增日程';
  $('fTemple').innerHTML = comboOpts(data.temples, ev?ev.temple:data.temples[0], '＋新增佛堂（單次）');
  $('fPlace').innerHTML = comboOpts(data.temples, ev?ev.place:'', '＋新增地點（單次）', '未指定');
  $('fType').innerHTML = comboOpts(typeNames(), ev?ev.type:typeNames()[0], '＋新增類型（單次）');
  syncCombo('fTemple','fTempleX'); syncCombo('fPlace','fPlaceX'); syncCombo('fType','fTypeX');
  $('fName').value = ev?ev.name:'';
  $('fDate').value = ev?ev.date:fmtDate(new Date());
  $('fEndDate').value = ev&&ev.endDate?ev.endDate:'';
  $('fStart').value = ev?ev.start:'';
  $('fEnd').value = ev?ev.end:'';
  setAllday(ev ? !ev.start : false);
  $('fLink').value = ev?ev.link:'';
  $('fNote').value = ev?ev.note:'';
  // 重複選項只在「新增」時出現；編輯單筆不重複
  $('repeatRow').style.display = ev?'none':'flex';
  $('fRepeat').value=''; $('fRepeatEnd').value=''; $('fRepeatEnd').disabled=true;
}
function openEvForm(ev){
  fillEvForm(ev);
  $('adminPanel').style.display='';
  $('adminPanel').scrollIntoView({behavior:'smooth',block:'start'});
}
function closeEvForm(){ $('adminPanel').style.display='none'; state.editingId=null; }
$('addEvBtn').onclick=()=>openEvForm(null);
$('evCancel').onclick=closeEvForm;
window.editEv = id=>{ const e=data.events.find(x=>x.id===id); if(e) openEvForm(e); };
// 複製日程文字（貼 LINE 群組用）
window.copyEv = async id=>{
  let e = data.events.find(x=>x.id===id);
  if(!e && id.startsWith('fx-')) e = fixedFor(new Date(id.slice(3)+'T00:00:00')); // 農曆固定日程
  if(!e) return;
  const wd=['日','一','二','三','四','五','六'];
  const d = new Date(e.date+'T00:00:00');
  const lines = [
    `【${e.type||'日程'}】${e.name}`,
    `日期：${e.date}（${wd[d.getDay()]}）${e.endDate?'～'+e.endDate:''}`,
    `時間：${timeText(e)}`,
    `佛堂：${e.temple}`,
  ];
  if(e.place) lines.push(`地點：${e.place}`);
  if(e.note) lines.push(`備註：${e.note}`);
  if(e.link) lines.push(`連結：${e.link}`);
  const txt = lines.join('\n');
  try{ await navigator.clipboard.writeText(txt); }
  catch(err){ // 舊瀏覽器 fallback
    const ta=document.createElement('textarea'); ta.value=txt;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  toast('已複製，可直接貼到 LINE');
};
window.delEv = async id=>{
  if(!confirm('確定要刪除這筆日程嗎？')) return;
  const j = await apiPost({action:'deleteEvent', id});
  if(j.ok){ toast('已刪除'); apiGet(); } else toast(j.error||'刪除失敗');
};
$('evSave').onclick=async()=>{
  const allday = $('tAllday').classList.contains('on');
  const ev = {
    temple:comboValue('fTemple','fTempleX'), name:$('fName').value.trim(), date:$('fDate').value,
    endDate:$('fEndDate').value,
    start:allday?'':$('fStart').value, end:allday?'':$('fEnd').value,
    type:comboValue('fType','fTypeX'), place:comboValue('fPlace','fPlaceX'), link:$('fLink').value.trim(), note:$('fNote').value.trim(),
  };
  if(!ev.temple||!ev.name||!ev.date) return toast('佛堂、名稱、日期為必填');
  if(ev.endDate && ev.endDate<ev.date) return toast('結束日期不可早於日期');
  if(ev.endDate===ev.date) ev.endDate='';
  // 重複性日程：展開成多筆一次送出
  const repeat=$('fRepeat').value, repeatEnd=$('fRepeatEnd').value;
  let body;
  if(!state.editingId && repeat){
    if(!repeatEnd || repeatEnd<ev.date) return toast('請選「重複到」的日期');
    const occ = occurrences(ev, repeat, repeatEnd);
    if(!occ.length) return toast('重複範圍內沒有任何場次');
    body = {action:'addEvents', events:occ};
  }else{
    body = state.editingId ? Object.assign({action:'updateEvent',id:state.editingId},ev)
                           : Object.assign({action:'addEvent'},ev);
  }
  $('evSave').textContent='儲存中…';
  const j = await apiPost(body);
  $('evSave').textContent='儲存';
  if(j.ok){ closeEvForm(); toast(j.count?('已建立 '+j.count+' 筆日程'):'已儲存'); apiGet(); }
  else toast(j.error||'儲存失敗');
};

/* ---------- 啟動 ---------- */
(function init(){
  try{ const c=localStorage.getItem('ft_cache_v1'); if(c) data=JSON.parse(c); }catch(e){}
  renderAll(); route();
  try{
    const a=localStorage.getItem('ft_admin');
    if(a && API_URL){
      const saved=JSON.parse(a);
      fetch(API_URL,{method:'POST',body:JSON.stringify({action:'login',adminName:saved.name,code:saved.code})})
        .then(r=>r.json()).then(j=>{ if(j.ok) setAdmin({name:j.name,code:saved.code}); else if(location.hash==='#admin') route(); })
        .catch(()=>{});
    }
  }catch(e){}
  apiGet();
})();
</script>
